name: Qogita Full Catalog Deep Drop (IMAP)

# Checks Gmail every 30 minutes for a new Qogita catalog email.
# If found, parses the Excel attachment and alerts Discord for 50%+ drops.
# Trigger a fresh catalog email from qogita.com whenever you want to
# update the baseline (the "Download catalog" > "Full catalog" button).

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_and_process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Check Gmail and process catalog
        env:
          GMAIL_ADDRESS:                       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:                  ${{ secrets.GMAIL_APP_PASSWORD }}
          DISCORD_WEBHOOK_FULLCATALOG_DEEPDROP: ${{ secrets.DISCORD_WEBHOOK_FULLCATALOG_DEEPDROP }}
          QOGITA_EMAIL:                        ${{ secrets.QOGITA_EMAIL }}
          QOGITA_PASSWORD:                     ${{ secrets.QOGITA_PASSWORD }}
        run: python qogita_imap_deepdrop_monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot_qogita_fullcatalog_deepdrop_prices.json baseline_done_fullcatalog_deepdrop.txt 2>/dev/null || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add snapshot_qogita_fullcatalog_deepdrop_prices.json baseline_done_fullcatalog_deepdrop.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update fullcatalog deepdrop snapshot [skip ci]"
          git push origin HEAD:main
