name: Qogita Maybelline Catalog Processor

# Triggered by the Cloudflare Worker via repository_dispatch when
# Qogita's async catalog-download job for Maybelline completes or fails.
# Do not add a schedule here — see qogita_trigger_maybelline.yml for that.

on:
  repository_dispatch:
    types: [qogita_catalog_maybelline]

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Process catalog download
        env:
          DISCORD_WEBHOOK_MAYBELLINE: ${{ secrets.DISCORD_WEBHOOK_MAYBELLINE }}
          QOGITA_DOWNLOAD_STATUS:     ${{ github.event.client_payload.status }}
          QOGITA_DOWNLOAD_URL:        ${{ github.event.client_payload.download_url }}
          QOGITA_ERROR_MESSAGE:       ${{ github.event.client_payload.error_message }}
        run: python qogita_maybelline_brand_monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || git pull --no-rebase origin main || true
          git add snapshot_qogita_maybelline_brand.json baseline_done_maybelline_brand.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update maybelline brand snapshot [skip ci]"
          git push origin HEAD:main
