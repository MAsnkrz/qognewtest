name: Qogita Mustela Catalog Processor

on:
  repository_dispatch:
    types: [qogita_catalog_mustela]

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Process catalog download
        env:
          DISCORD_WEBHOOK_MUSTELA: ${{ secrets.DISCORD_WEBHOOK_MUSTELA }}
          QOGITA_DOWNLOAD_STATUS:  ${{ github.event.client_payload.status }}
          QOGITA_DOWNLOAD_URL:     ${{ github.event.client_payload.download_url }}
          QOGITA_ERROR_MESSAGE:    ${{ github.event.client_payload.error_message }}
        run: python qogita_mustela_brand_monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || git pull --no-rebase origin main || true
          git add snapshot_qogita_mustela_brand.json baseline_done_mustela_brand.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update mustela brand snapshot [skip ci]"
          git push origin HEAD:main
