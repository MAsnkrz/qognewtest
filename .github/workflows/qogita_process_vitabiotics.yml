name: Qogita Vitabiotics Catalog Processor

# Triggered by the Cloudflare Worker via repository_dispatch when
# Qogita's async catalog-download job for Vitabiotics completes or fails.
# Do not add a schedule here — see qogita_trigger_vitabiotics.yml for that.

on:
  repository_dispatch:
    types: [qogita_catalog_vitabiotics]

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Process catalog download
        env:
          DISCORD_WEBHOOK_VITABIOTICS: ${{ secrets.DISCORD_WEBHOOK_VITABIOTICS }}
          QOGITA_DOWNLOAD_STATUS:      ${{ github.event.client_payload.status }}
          QOGITA_DOWNLOAD_URL:         ${{ github.event.client_payload.download_url }}
          QOGITA_ERROR_MESSAGE:        ${{ github.event.client_payload.error_message }}
        run: python qogita_vitabiotics_brand_monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot_qogita_vitabiotics_brand.json baseline_done_vitabiotics_brand.txt 2>/dev/null || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add snapshot_qogita_vitabiotics_brand.json baseline_done_vitabiotics_brand.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update vitabiotics brand snapshot [skip ci]"
          git push origin HEAD:main
