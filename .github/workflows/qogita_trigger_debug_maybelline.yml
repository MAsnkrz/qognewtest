name: Qogita DEBUG Trigger (Maybelline brand test)

# TEMPORARY debugging workflow — fires a catalog-download for
# brand_names=["Maybelline"] instead of category_slug, to verify the
# whole webhook pipeline (Worker -> dispatch -> processor -> parse)
# works correctly, independent of whether the "makeup" category_slug
# value itself is correct. Routes through the SAME Makeup processor
# (qogita_process_makeup.yml), since the Worker treats a Maybelline
# brand filter as belonging to the Makeup pipeline for this test.
#
# Delete this workflow file once debugging is done.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Trigger catalog download (Maybelline brand test)
        env:
          QOGITA_EMAIL:    ${{ secrets.QOGITA_EMAIL }}
          QOGITA_PASSWORD: ${{ secrets.QOGITA_PASSWORD }}
          BRAND_NAME: "Maybelline"
        run: python qogita_catalog_trigger.py
