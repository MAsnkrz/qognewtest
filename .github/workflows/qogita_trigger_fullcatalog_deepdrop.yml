name: Qogita Full Catalog Deep Drop Trigger

# Fires the async catalog-download request covering the ENTIRE Qogita
# catalogue (all 530 categories submitted as a slug list — confirmed
# working via testing). Runs every 2 hours. Only the processor fires
# Discord alerts, and only for drops of 50%+.

on:
  schedule:
    - cron: "45 */2 * * *"   # every 2 hours, offset from others
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10    # fetching 530 slugs + API call needs a bit more time

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Trigger full catalog download
        env:
          QOGITA_EMAIL:    ${{ secrets.QOGITA_EMAIL }}
          QOGITA_PASSWORD: ${{ secrets.QOGITA_PASSWORD }}
          ALL_CATEGORIES: "true"
        run: python qogita_catalog_trigger.py
