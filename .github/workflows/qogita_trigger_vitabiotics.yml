name: Qogita Vitabiotics Catalog Trigger

# Fires the async catalog-download request for Vitabiotics.
# Does NOT process the result — that happens in a separate workflow
# triggered by repository_dispatch once the webhook fires.

on:
  schedule:
    - cron: "20 */2 * * *"   # every 2 hours, offset from others
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Trigger catalog download
        env:
          QOGITA_EMAIL:    ${{ secrets.QOGITA_EMAIL }}
          QOGITA_PASSWORD: ${{ secrets.QOGITA_PASSWORD }}
          BRAND_NAME: "Vitabiotics"
        run: python qogita_catalog_trigger.py
